<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>EBDS - Driver Drowsiness System</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/socket.io/4.0.1/socket.io.js"></script>
    <style>
        body { 
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; 
            background-color: #0f0f0f; 
            color: #e0e0e0; 
            margin: 0; 
            display: flex; 
            flex-direction: column; 
            align-items: center; 
            min-height: 100vh;
            padding: 20px;
        }
        .container { 
            text-align: center; 
            background: #1e1e1e; 
            padding: 30px; 
            border-radius: 20px; 
            box-shadow: 0 15px 35px rgba(0,0,0,0.7); 
            max-width: 800px;
            width: 100%;
        }
        h1 { 
            color: #00ff88; 
            margin-bottom: 25px; 
            font-size: 2.5rem;
            text-transform: uppercase;
            letter-spacing: 2px;
        }
        .controls { 
            margin-bottom: 25px; 
            display: flex;
            justify-content: center;
            gap: 15px;
        }
        button { 
            background-color: #333; 
            color: white; 
            border: 2px solid #444; 
            padding: 12px 24px; 
            border-radius: 10px; 
            cursor: pointer; 
            font-weight: bold; 
            transition: all 0.3s ease;
            font-size: 1rem;
        }
        button:hover { 
            background-color: #444; 
            border-color: #00ff88;
            transform: translateY(-2px);
        }
        button.active {
            background-color: #00ff88;
            color: #000;
            border-color: #00ff88;
        }
        .video-container { 
            border: 4px solid #333; 
            border-radius: 15px; 
            overflow: hidden; 
            margin-bottom: 25px; 
            position: relative;
            background: #000;
            line-height: 0;
        }
        #video-feed {
            max-width: 100%;
            height: auto;
        }
        .status-panel {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 20px;
            margin-top: 20px;
            background: #252525;
            padding: 15px;
            border-radius: 12px;
        }
        .status-item {
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        .status-label {
            font-size: 0.9rem;
            color: #888;
            margin-bottom: 5px;
        }
        .status-value {
            font-size: 1.2rem;
            font-weight: bold;
            color: #fff;
        }
        .drowsy-alert {
            animation: blink 0.5s infinite alternate;
            color: #ff4444 !important;
        }
        @keyframes blink {
            from { opacity: 1; }
            to { opacity: 0.5; }
        }
        #alarm-status {
            margin-top: 15px;
            font-size: 0.9rem;
            color: #ff8800;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>EBDS Dashboard</h1>
        
        <div class="controls">
            <button id="btn-drowsiness" class="active" onclick="setMode('drowsiness')">Drowsiness</button>
            <button id="btn-hci" onclick="setMode('hci')">HCI (Nose)</button>
            <button id="btn-attendance" onclick="setMode('attendance')">Attendance</button>
            <button id="btn-enable-audio" style="background-color: #ff4444; border-color: #ff4444; margin-left: 15px;" onclick="enableAudio()">🔔 Enable Audio Alarm</button>
        </div>

        <div class="video-container">
            <img id="video-feed" src="{{ url_for('video_feed') }}">
        </div>

        <div class="status-panel">
            <div class="status-item">
                <span class="status-label">Current Mode</span>
                <span id="current-mode-val" class="status-value">Drowsiness</span>
            </div>
            <div class="status-item">
                <span class="status-label">System Status</span>
                <span id="current-status-val" class="status-value">Normal</span>
            </div>
        </div>

        <div id="alarm-status">Alarm will sound on drowsiness detection</div>
        <p style="margin-top: 20px; color: #666; font-size: 0.8rem;">Powered by MediaPipe & Flask</p>
    </div>

    <script>
        const socket = io();
        
        // --- Web Audio API for Reliable Buzzer ---
        let audioCtx = null;
        let beepInterval = null;
        let isAlarmPlaying = false;

        function enableAudio() {
            if (!audioCtx) {
                const AudioContext = window.AudioContext || window.webkitAudioContext;
                audioCtx = new AudioContext();
            }
            if (audioCtx.state === 'suspended') {
                audioCtx.resume();
            }
            
            // Play a quick test beep to confirm it's working
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime);
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            osc.start();
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.1);
            osc.stop(audioCtx.currentTime + 0.1);

            // Hide the enable button once clicked
            document.getElementById('btn-enable-audio').style.display = 'none';
            document.getElementById('alarm-status').innerText = "🔊 Audio Alarm is Active! (Will beep when drowsy)";
            document.getElementById('alarm-status').style.color = "#00ff88";
        }

        function beep() {
            if (!audioCtx || audioCtx.state === 'suspended') return;
            const osc = audioCtx.createOscillator();
            const gainNode = audioCtx.createGain();
            
            osc.type = 'square';
            osc.frequency.setValueAtTime(800, audioCtx.currentTime); // 800 Hz alarm
            
            osc.connect(gainNode);
            gainNode.connect(audioCtx.destination);
            
            osc.start();
            gainNode.gain.setValueAtTime(1, audioCtx.currentTime);
            gainNode.gain.exponentialRampToValueAtTime(0.001, audioCtx.currentTime + 0.3); // sharp 300ms beep
            osc.stop(audioCtx.currentTime + 0.3);
        }

        function playBuzzer() {
            if (!isAlarmPlaying) {
                isAlarmPlaying = true;
                beep(); // play first beep immediately
                beepInterval = setInterval(beep, 500); // repeat every 500ms
            }
        }

        function stopBuzzer() {
            if (isAlarmPlaying) {
                clearInterval(beepInterval);
                isAlarmPlaying = false;
            }
        }

        socket.on('status_update', function(data) {
            document.getElementById('current-status-val').innerText = data.status;
            
            if (data.status === 'Drowsy') {
                document.getElementById('current-status-val').classList.add('drowsy-alert');
                playBuzzer();
            } else {
                document.getElementById('current-status-val').classList.remove('drowsy-alert');
                stopBuzzer();
            }

            if (data.status === 'Attendance Logged') {
                document.getElementById('current-status-val').style.color = '#00ff88';
            } else if (data.status !== 'Drowsy') {
                document.getElementById('current-status-val').style.color = '#fff';
            }
        });

        function setMode(mode) {
            fetch('/set_mode', { 
                method: 'POST', 
                headers: { 'Content-Type': 'application/json' }, 
                body: JSON.stringify({ mode: mode }) 
            })
            .then(res => res.json())
            .then(data => {
                if(data.success) {
                    document.getElementById('current-mode-val').innerText = data.mode.charAt(0).toUpperCase() + data.mode.slice(1);
                    
                    // Update active button (excluding the enable audio button)
                    document.querySelectorAll('.controls button:not(#btn-enable-audio)').forEach(btn => btn.classList.remove('active'));
                    document.getElementById('btn-' + mode).classList.add('active');
                    
                    // Stop any ongoing alarm when switching modes
                    stopBuzzer();
                    document.getElementById('current-status-val').classList.remove('drowsy-alert');
                    document.getElementById('current-status-val').innerText = "Normal";
                }
            })
            .catch(err => {
                console.error("Error setting mode:", err);
                alert("Failed to switch modes. Please make sure the server is running.");
            });
        }
    </script>
</body>
</html>
