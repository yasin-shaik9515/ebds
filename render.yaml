services:
  - type: web
    name: ebds
    env: python
    region: ohio
    plan: free
    buildCommand: python download_model.py
    startCommand: gunicorn --worker-class eventlet -w 1 --bind 0.0.0.0:$PORT app:app
    envVars:
      - key: PYTHON_VERSION
        value: 3.9
        // The PYTHON_VERSION environment variable is used to specify the version of Python to use for the application. In this case, it is set to 3.9.